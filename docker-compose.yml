#    command: ["goose", "-dir", "/migrations", "up"]
#    depends_on:
#      postgres:
#        condition: service_healthy
#    restart: on-failure

  user-service:
    build:
      context: .
      dockerfile: services/user_service/Dockerfile
    env_file: services/user_service/.env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  auth-service:
    build:
      context: .
      dockerfile: services/auth_service/Dockerfile
    env_file: services/auth_service/.env
    ports:
      - "8081:8081"
    depends_on:
      - redis
      - user-service

volumes:
  postgres_data: