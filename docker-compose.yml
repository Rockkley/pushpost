services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pushpost
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  user-service:
    build:
      context: .
      dockerfile: services/user_service/Dockerfile
    env_file: services/user_service/.env
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy

  auth-service:
    build:
      context: .
      dockerfile: services/auth_service/Dockerfile
    env_file: services/auth_service/.env
    expose:
      - "8081"
    depends_on:
      redis:
        condition: service_healthy
      user-service:
        condition: service_started

  friendship-service:
    build:
      context: .
      dockerfile: services/friendship_service/Dockerfile
    env_file: services/friendship_service/.env
    expose:
      - "8082"   # HTTP
      - "9082"   # gRPC
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  profile-service:
    build:
      context: .
      dockerfile: services/profile_service/Dockerfile
    env_file: services/profile_service/.env
    expose:
      - "8083"
    depends_on:
      - user-service

  message-service:
    build:
      context: .
      dockerfile: services/message_service/Dockerfile
    env_file: services/message_service/.env
    expose:
      - "8084"
    depends_on:
      postgres:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: services/api_gateway/Dockerfile
    env_file: services/api_gateway/.env
    ports:
      - "8000:8000"
    depends_on:
      - auth-service
      - user-service
      - friendship-service
      - profile-service
      - message-service

volumes:
  postgres_data:
  kafka_data: