global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: pushpost-services
    metrics_path: /metrics
    static_configs:
      - targets:
          - user-service:8080
          - auth-service:8081
          - friendship-service:8082
          - profile-service:8083
          - message-service:8084
          - post-service:8085
          - notification-service:8086
          - api-gateway:8000
